image: python:3.11

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml

stages:
  - format
  - lint
  - type_check
  - security
  - test
  - coverage
  - changelog

# ... (cache and before_script)

# -----------------------------------
# SECURITY STAGE
# -----------------------------------
security:
  stage: security
  script:
    - bandit -r backend/app
    - semgrep --config auto backend/app
    - pip-audit || true

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks
    entrypoint: [""]
  script:
    - gitleaks detect --verbose --source .

git-cliff:
  stage: changelog
  script:
    - git cliff --output CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  only:
    - main
    - tags



# -----------------------------------
# TEST STAGE
# -----------------------------------
test:
  stage: test
  script:
    - pytest tests -q

# -----------------------------------
# COVERAGE STAGE
# -----------------------------------
coverage:
  stage: coverage
  script:
    - pytest tests --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=80

  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

    paths:
      - coverage.xml

    expire_in: 1 week