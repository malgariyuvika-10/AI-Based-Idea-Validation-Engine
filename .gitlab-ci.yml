image: python:3.11

stages:
  - lint
  - security
  - test

before_script:
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install -r requirements-dev.txt

lint:
  stage: lint
  script:
    - ruff check .
    - mypy .
    - pylint .
    - flake8 .
    - vulture .

security:
  stage: security
  script:
    - bandit -r .
    - semgrep --config auto .

test:
  stage: test
  script:
    - export PYTHONPATH=$CI_PROJECT_DIR
    - pytest tests --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=80
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml